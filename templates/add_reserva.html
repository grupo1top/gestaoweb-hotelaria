<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Nova reserva</title>
</head>
<body>
    <a class="site-logo" href="/" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo da hotelaria">
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/hospede">Hóspedes</a>
        <a href="/quartos">Quartos</a>
        <a href="/reservas">Reservas</a>
    </nav>

    <main class="page-shell">
        <header class="page-header">
            <p class="eyebrow">Cadastro</p>
            <h1 class="page-title">Nova reserva</h1>
            <p class="page-subtitle">Informe o hóspede, o quarto e o período da reserva para salvar o registro.</p>
        </header>

        <section class="form-panel">
            <form action="/add_reserva" method="POST">
                <label>
                    <span>ID hóspede titular</span>
                    <input type="text" name="id_hospede" placeholder="ID hóspede" required>
                </label>
                <label>
                    <span>ID do quarto reservado</span>
                    <input type="text" name="id_quarto" placeholder="ID quarto" required>
                </label>
                <label>
                    <span>Data entrada</span>
                    <input type="date" name="data_entrada" required>
                </label>
                <label>
                    <span>Data saída</span>
                    <input type="date" name="data_saida" required>
                </label>
                <div class="inline-actions">
                    <button type="submit" class="button button-primary">Cadastrar reserva</button>
                    <a class="button" href="/reservas">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
