<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>HOTELARIA - NOVA RESERVA</title>

</head>

<body>
    <div class="navbar">
       <a href="/home">HOME</a>
        <a href="/hospede">HÓSPEDES</a>
        <a href="/quartos">QUARTOS</a>
        <a href="/reservas">RESERVAS</a>
    </div>

    <main class="container">
        <div class="form-header">
            <h1>Criar Nova Reserva</h1>
            <a href="/reservas" class="btn-back">← Voltar</a>
        </div>

        <form method="POST" action="/add_reserva" class="form">
            <div class="form-group">
                <label for="hospede_id">Hóspede:</label>
                <select id="hospede_id" name="hospede_id" required>
                    <option value="">Selecione um hóspede...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quarto_id">Quarto:</label>
                <select id="quarto_id" name="quarto_id" required>
                    <option value="">Selecione um quarto...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="data_entrada">Data de Entrada:</label>
                <input type="date" id="data_entrada" name="data_entrada" required>
            </div>

            <div class="form-group">
                <label for="data_saida">Data de Saída:</label>
                <input type="date" id="data_saida" name="data_saida" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Salvar Reserva</button>
                <a href="/reservas" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </main>
</body>

</html>
