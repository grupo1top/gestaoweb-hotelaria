<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>HOTELARIA - EDITAR RESERVA</title>

</head>
<body>
     <div class="navbar">
        <a href="/hospede">HÓSPEDES</a>
       <a href="/quartos">QUARTOS</a>
       <a href="/reservas">RESERVAS</a>
    </div>
         <h1>Atualização Cadastral de Reservas</h1>
    <form action="/edit_reserva/{{ reserva.id }}" method="POST">
        <h4>ID hóspede titular</h4>
        <input type="text" name="id_hospede" placeholder="ID hóspede">
        <h4>ID do quarto reservado</h4>
        <input type="text" name="id_quarto" placeholder="ID quarto">
        <h4>Data entrada</h4>
        <input type="date" name="data_entrada" placeholder="Data Entrada">
        <h4>Data saída</h4>
        <input type="date" name="data_saida" placeholder="Data Saída">
        <button type="submit">Atualizar reserva</button>

    </form>
</body>
</html>
