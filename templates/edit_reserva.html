<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/logo.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Editar reserva</title>
</head>
<body>
    <a class="site-logo" href="/" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo da hotelaria">
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/hospede">Hóspedes</a>
        <a href="/quartos">Quartos</a>
        <a href="/reservas">Reservas</a>
    </nav>

    <main class="page-shell">
        <header class="page-header">
            <p class="eyebrow">Edição</p>
            <h1 class="page-title">Atualização cadastral de reservas</h1>
            <p class="page-subtitle">Revise os dados abaixo e atualize apenas o que for necessário.</p>
        </header>

        <section class="form-panel">
            <form action="/edit_reserva/{{ reserva.id }}" method="POST">
                <label>
                    <span>ID hóspede titular</span>
                    <input type="text" name="id_hospede" placeholder="ID hóspede" value="{{ reserva.hospede_id }}" required>
                </label>
                <label>
                    <span>ID do quarto reservado</span>
                    <input type="text" name="id_quarto" placeholder="ID quarto" value="{{ reserva.quarto_id }}" required>
                </label>
                <label>
                    <span>Data entrada</span>
                    <input type="date" name="data_entrada" value="{{ reserva.data_entrada }}" required>
                </label>
                <label>
                    <span>Data saída</span>
                    <input type="date" name="data_saida" value="{{ reserva.data_saida }}" required>
                </label>
                <div class="inline-actions">
                    <button type="submit" class="button button-primary">Atualizar reserva</button>
                    <a class="button" href="/reservas">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
