<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Novo hóspede</title>
</head>
<body>
    <a class="site-logo" href="/" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo da hotelaria">
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/hospede">Hóspedes</a>
        <a href="/quartos">Quartos</a>
        <a href="/reservas">Reservas</a>
    </nav>

    <main class="page-shell">
        <header class="page-header">
            <p class="eyebrow">Cadastro</p>
            <h1 class="page-title">Novo hóspede</h1>
            <p class="page-subtitle">Preencha os dados do cliente para incluir um novo cadastro no sistema.</p>
        </header>

        <section class="form-panel">
            <form action="/add_hospede" method="POST">
                <label>
                    <span>Nome completo</span>
                    <input type="text" name="nome" placeholder="Nome completo" required>
                </label>
                <label>
                    <span>Email</span>
                    <input type="email" name="email" placeholder="Email" required>
                </label>
                <label>
                    <span>Telefone</span>
                    <input type="text" name="telefone" placeholder="Telefone" required>
                </label>
                <label>
                    <span>CPF</span>
                    <input type="text" name="cpf" placeholder="Somente números" required>
                </label>
                <div class="inline-actions">
                    <button type="submit" class="button button-primary">Cadastrar hóspede</button>
                    <a class="button" href="/hospede">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
