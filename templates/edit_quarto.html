<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/logo.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Editar quarto</title>
</head>
<body>
    <a class="site-logo" href="/" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo da hotelaria">
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/hospede">Hóspedes</a>
        <a href="/quartos">Quartos</a>
        <a href="/reservas">Reservas</a>
    </nav>

    <main class="page-shell">
        <header class="page-header">
            <p class="eyebrow">Edição</p>
            <h1 class="page-title">Atualização cadastral de quartos</h1>
            <p class="page-subtitle">Revise o número, o tipo, o valor da diária e o status antes de salvar.</p>
        </header>

        <section class="form-panel">
            <form action="/edit_quarto/{{ quartos.id }}" method="POST">
                <label>
                    <span>Número do quarto</span>
                    <input type="text" name="numero" placeholder="Número" value="{{ quartos.numero }}" required>
                </label>
                <label>
                    <span>Tipo de quarto</span>
                    <select name="tipo" required>
                        <option value="" {% if not quartos.tipo %}selected{% endif %}>Selecione um tipo</option>
                        <option value="Solteiro" {% if quartos.tipo == 'Solteiro' %}selected{% endif %}>Solteiro</option>
                        <option value="Casal" {% if quartos.tipo == 'Casal' %}selected{% endif %}>Casal</option>
                        <option value="Luxo" {% if quartos.tipo == 'Luxo' %}selected{% endif %}>Luxo</option>
                        <option value="Suíte Master" {% if quartos.tipo == 'Suíte Master' %}selected{% endif %}>Suíte Master</option>
                        <option value="Família" {% if quartos.tipo == 'Família' %}selected{% endif %}>Família</option>
                    </select>
                </label>
                <label>
                    <span>Valor da diária</span>
                    <input type="text" name="valor_diaria" placeholder="Valor diária" value="{{ quartos.valor_diaria }}" required>
                </label>
                <label>
                    <span>Status</span>
                    <select name="status" required>
                        <option value="DISPONÍVEL" {% if quartos.status == 'DISPONÍVEL' %}selected{% endif %}>Disponível</option>
                        <option value="OCUPADO" {% if quartos.status == 'OCUPADO' %}selected{% endif %}>Ocupado</option>
                    </select>
                </label>
                <div class="inline-actions">
                    <button type="submit" class="button button-primary">Atualizar cadastro</button>
                    <a class="button" href="/quartos">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
