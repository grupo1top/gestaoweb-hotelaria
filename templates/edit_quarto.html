<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>HOTELARIA - EDITAR QUARTO</title>

</head>
<body>
     <div class="navbar">
        <a href="hospede">HÓSPEDES</a>
       <a href="/quartos">QUARTOS</a>
       <a href="/reservas">RESERVAS</a>
    </div>
        <h1>Atualização Cadastral de Quartos</h1>
    <form action="/edit_quarto/{{ quartos.id }}" method="POST">
          <h4>Número do quarto</h4>
        <input type="text" name="numero" placeholder="Número ">
        <h4>Tipo de quarto</h4>

         <select name="tipo">
              <option value="">Selecione um tipo</option>

        <option value="Solteiro">
            Solteiro
        </option>

        <option value="Casal">
            Casal
        </option>

        <option value="Luxo">
            Luxo
        </option>

        <option value="Suíte Master">
            Suíte Master
        </option>

        <option value="Família">
            Família
        </option>

        </select>

        <h4>Valor da diária</h4>
        <input type="text" name="valor_diaria" placeholder="Valor Diária">
        <h4>Satus</h4>

        <select name="status">
            <option value="DISPONÍVEL">Disponível</option>
            <option value="OCUPADO">Ocupado</option>
        </select>

        <button type="submit">Atualizar cadastro</button>

    </form>
</body>
</html>
