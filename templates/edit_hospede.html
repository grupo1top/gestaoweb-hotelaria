<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>HOTELARIA - EDITAR HÓSPEDE</title>

</head>

<body>
    <div class="navbar">
        <a href="/home">HOME</a>
        <a href="/hospede">HÓSPEDES</a>
        <a href="/quartos">QUARTOS</a>
        <a href="/reservas">RESERVAS</a>
    </div>

    <main class="container">
        <div class="form-header">
            <h1>Editar Hóspede</h1>
            <a href="/hospede" class="btn-back">← Voltar</a>
        </div>

        <form method="POST" action="/edit_hospede/1" class="form">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>

            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Atualizar</button>
                <a href="/hospede" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </main>
</body>

</html>
