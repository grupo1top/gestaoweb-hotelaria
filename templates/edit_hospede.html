<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/logo.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Editar hóspede</title>
</head>
<body>
    <a class="site-logo" href="/" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo da hotelaria">
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/hospede">Hóspedes</a>
        <a href="/quartos">Quartos</a>
        <a href="/reservas">Reservas</a>
    </nav>

    <main class="page-shell">
        <header class="page-header">
            <p class="eyebrow">Edição</p>
            <h1 class="page-title">Editar informações do hóspede</h1>
            <p class="page-subtitle">Insira os dados atualizados do hóspede cadastrado.</p>
        </header>

        <section class="form-panel">
            <form action="/edit_hospede/{{ hospede.id }}" method="POST">
                <label>
                    <span>Nome completo</span>
                    <input type="text" name="nome" placeholder="Nome completo" value="{{ hospede.nome }}" required>
                </label>
                <label>
                    <span>Email</span>
                    <input type="email" name="email" placeholder="Email" value="{{ hospede.email }}" required>
                </label>
                <label>
                    <span>Telefone</span>
                    <input type="text" name="telefone" placeholder="Telefone" value="{{ hospede.telefone }}" required>
                </label>
                <label>
                    <span>CPF</span>
                    <input type="text" name="cpf" placeholder="Somente números" value="{{ hospede.cpf }}" required>
                </label>
                <div class="inline-actions">
                    <button type="submit" class="button button-primary">Editar hóspede</button>
                    <a class="button" href="/hospede">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
