<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Novo quarto</title>
</head>
<body>
    <a class="site-logo" href="/" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', path='img/logo.png') }}" alt="Logo da hotelaria">
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/hospede">Hóspedes</a>
        <a href="/quartos">Quartos</a>
        <a href="/reservas">Reservas</a>
    </nav>

    <main class="page-shell">
        <header class="page-header">
            <p class="eyebrow">Cadastro</p>
            <h1 class="page-title">Novo quarto</h1>
            <p class="page-subtitle">Informe número, tipo, valor da diária e status para criar o quarto.</p>
        </header>

        <section class="form-panel">
            <form action="/add_quarto" method="POST">
                <label>
                    <span>Número do quarto</span>
                    <input type="text" name="numero" placeholder="Número" required>
                </label>
                <label>
                    <span>Tipo de quarto</span>
                    <select name="tipo" required>
                        <option value="" selected>Selecione um tipo</option>
                        <option value="Solteiro">Solteiro</option>
                        <option value="Casal">Casal</option>
                        <option value="Luxo">Luxo</option>
                        <option value="Suíte Master">Suíte Master</option>
                        <option value="Família">Família</option>
                    </select>
                </label>
                <label>
                    <span>Valor da diária</span>
                    <input type="text" name="valor_diaria" placeholder="Valor da diária" required>
                </label>
                <label>
                    <span>Status</span>
                    <select name="status" required>
                        <option value="DISPONÍVEL" selected>Disponível</option>
                        <option value="OCUPADO">Ocupado</option>
                    </select>
                </label>
                <div class="inline-actions">
                    <button type="submit" class="button button-primary">Adicionar quarto</button>
                    <a class="button" href="/quartos">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
