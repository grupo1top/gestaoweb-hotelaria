<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script defer src="{{ url_for('static', path='js/script.js') }}"></script>
    <title>Hotelaria | Novo quarto</title>

</head>
<body class="dashboard-page">
     <div class="navbar">
        <a href="/hospede">HÓSPEDES</a>
       <a href="/quartos">QUARTOS</a>
       <a href="/reservas">RESERVAS</a>
    </div>
    <main class="dashboard-shell">
        <section class="panel dashboard-hero" data-reveal>
            <div class="dashboard-hero__copy">
                <p class="dashboard-kicker">Cadastro</p>
                <h1 class="dashboard-title">Novo quarto</h1>
                <p class="dashboard-subtitle">Informe número, tipo, valor da diária e status para criar o quarto.</p>
            </div>
            <div class="dashboard-hero__chips" aria-label="Ações rápidas">
                <a class="dashboard-chip" href="/quartos">Voltar para quartos</a>
                <a class="dashboard-chip" href="/">Dashboard</a>
            </div>
        </section>

        <section class="metrics-grid" aria-label="Resumo do cadastro">
            <article class="metric-card" data-reveal>
                <span class="metric-card__label">Ação</span>
                <strong class="metric-card__value">Criar</strong>
            </article>
            <article class="metric-card" data-reveal>
                <span class="metric-card__label">Fluxo</span>
                <strong class="metric-card__value">Quartos</strong>
            </article>
            <article class="metric-card metric-card--accent" data-reveal>
                <span class="metric-card__label">Campos</span>
                <strong class="metric-card__value">4</strong>
            </article>
            <article class="metric-card" data-reveal>
                <span class="metric-card__label">Status</span>
                <strong class="metric-card__value">Novo</strong>
            </article>
        </section>

        <section class="panel dashboard-actions" aria-labelledby="add-quarto-title" data-reveal>
            <div class="section-heading">
                <div>
                    <p class="section-heading__eyebrow">Formulário</p>
                    <h2 id="add-quarto-title">Cadastro de quartos</h2>
                </div>
                <p class="section-heading__subtitle">Preencha os campos abaixo para registrar um novo quarto.</p>
            </div>

            <form action="/add_quarto" method="POST">
                <label>
                    <span class="hint">Número do quarto</span>
                    <input type="text" name="numero" placeholder="Número" required>
                </label>

                <label>
                    <span class="hint">Tipo de quarto</span>
                    <select name="tipo" required>
                        <option value="" selected>Selecione um tipo</option>
                        <option value="Solteiro">Solteiro</option>
                        <option value="Casal">Casal</option>
                        <option value="Luxo">Luxo</option>
                        <option value="Suíte Master">Suíte Master</option>
                        <option value="Família">Família</option>
                    </select>
                </label>

                <label>
                    <span class="hint">Valor da diária</span>
                    <input type="text" name="valor_diaria" placeholder="Valor da diária" required>
                </label>

                <label>
                    <span class="hint">Status</span>
                    <select name="status" required>
                        <option value="DISPONÍVEL" selected>Disponível</option>
                        <option value="OCUPADO">Ocupado</option>
                    </select>
                </label>

                <div class="hospedes__toolbar">
                    <button type="submit" class="hospedes__button hospedes__button--primary">Adicionar quarto</button>
                    <a class="hospedes__button" href="/quartos">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
